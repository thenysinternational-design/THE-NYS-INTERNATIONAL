<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>THE NYS INTERNATIONAL | Courier & Cargo Services</title>

<style>
:root{
--bg:#071022;
--card:#0f1b38;
--text:#ffffff;
--muted:#b8c6ff;
--accent:#ffd27a;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0a1635,#050b18);
color:var(--text);
}

.wrap{max-width:1100px;margin:auto;padding:18px}

/* Top */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logoBox{
width:60px;
height:60px;
background:#111b33;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

.logoBox img{
width:100%;
height:100%;
object-fit:contain;
}

.brand h1{margin:0;font-size:18px}
.brand p{margin:0;font-size:12px;color:var(--muted)}

.btn{
padding:10px 16px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
display:inline-block;
}

.primary{
background:linear-gradient(135deg,#ffd27a,#ffb84d);
color:#000;
box-shadow:0 0 15px rgba(255,210,122,.6);
}

/* Banner */
.hero{
margin-top:15px;
border-radius:15px;
overflow:hidden;
background:#000;
}

.hero img{
width:100%;
object-fit:contain; /* FULL BANNER */
display:block;
}

/* Cards */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

@media(max-width:800px){
.grid{grid-template-columns:1fr}
}

.card{
background:var(--card);
padding:18px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.card h2{margin-top:0}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
font-size:14px;
}

.submit{
margin-top:10px;
background:#ffd27a;
border:none;
padding:12px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.copyBtn{
margin-top:8px;
background:#1d2c55;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

footer{
margin-top:25px;
text-align:center;
font-size:12px;
color:var(--muted);
}
</style>
</head>

<body>
<div class="wrap">

<div class="topbar">
<div class="brand">
<div class="logoBox">
<img src="logo.png" alt="Logo">
</div>
<div>
<h1>THE NYS INTERNATIONAL</h1>
<p>Courier • Cargo • E-Commerce Services</p>
</div>
</div>

<!-- WHATSAPP QUICK SUPPORT BUTTON -->
<a class="btn primary"
href="https://wa.me/918377931958?text=Hello%20THE%20NYS%20INTERNATIONAL,%20I%20need%20quick%20courier%20support.%20Please%20contact%20me.%20Pickup%20details%20will%20be%20shared."
target="_blank">
🚀 For Quick Support – Connect on WhatsApp
</a>

</div>

<div class="hero">
<img src="banner.jpg" alt="Banner">
</div>

<div class="grid">

<div class="card">
<h2>Our Services</h2>
<p>✔ Domestic Courier</p>
<p>✔ International Shipping</p>
<p>✔ Cargo & Bulk Dispatch</p>
<p>✔ E-Commerce Dispatch Support</p>
</div>

<div class="card">
<h2>Track Your Shipment</h2>

<form id="trackForm">

<label>Tracking / AWB Number</label>
<input type="text" id="awb" placeholder="Enter Tracking Number" required>

<label style="margin-top:10px;">Select Courier Service</label>
<select id="service" required>
<option value="">Choose service</option>
<option value="bluedart">Blue Dart</option>
<option value="delhivery">Delhivery</option>
<option value="dtdc">DTDC</option>
<option value="indiapost">India Post</option>
</select>

<button type="submit" class="submit">Search</button>

<button type="button" class="copyBtn" onclick="copyAWB()">Copy Tracking Number</button>

</form>
</div>

</div>

<footer>
© <span id="yr"></span> THE NYS INTERNATIONAL. All rights reserved.
</footer>

</div>

<script>
document.getElementById("yr").innerText=new Date().getFullYear();

function copyAWB(){
let awb=document.getElementById("awb").value;
if(!awb){alert("Enter tracking number first");return;}
navigator.clipboard.writeText(awb);
alert("Tracking number copied ✅");
}

document.getElementById("trackForm").addEventListener("submit",function(e){
e.preventDefault();
let awb=document.getElementById("awb").value;
let service=document.getElementById("service").value;

if(!awb || !service){
alert("Please enter tracking number & select service");
return;
}

navigator.clipboard.writeText(awb);

let url="";
if(service==="bluedart"){
url="https://www.bluedart.com/web/guest/trackdartresult?trackFor=0&trackNo="+awb;
}
if(service==="delhivery"){
url="https://www.delhivery.com/tracking";
}
if(service==="dtdc"){
url="https://www.dtdc.com/track-your-shipment/";
}
if(service==="indiapost"){
url="https://www.indiapost.gov.in/_layouts/15/dop.portal.tracking/trackconsignment.aspx";
}

window.open(url,"_blank");

setTimeout(function(){
alert("Tracking page opened ✅\nIf number not auto-filled, paste copied tracking number.");
},200);
});
</script>

</body>
</html>
